<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Benson.O profile map</title>
  <desc id="desc">A graphical personal profile map connecting AI infrastructure, agent systems, applied AI systems, and knowledge workflows.</desc>
  <defs>
    <style>
      .bg { fill: #f7faf8; }
      .ink { fill: #17212b; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #647386; font-family: Inter, Arial, sans-serif; }
      .card { fill: #ffffff; stroke: #dce7df; stroke-width: 2; }
      .green { fill: #73c000; }
      .blue { fill: #2477c8; }
      .cyan { fill: #00a6a6; }
      .purple { fill: #6a5bd7; }
      .orange { fill: #f0a000; }
      .line { stroke: #8aa39a; stroke-width: 4; fill: none; stroke-linecap: round; }
      .thin { stroke: #c8d6cf; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <path class="thin" d="M0 130H1600M0 260H1600M0 390H1600M0 520H1600M0 650H1600M0 780H1600"/>
  <path class="thin" d="M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900M1120 0V900M1280 0V900M1440 0V900"/>

  <text x="90" y="95" class="green" font-size="30" font-weight="700">Benson.O / superobk</text>
  <text x="90" y="154" class="ink" font-size="54" font-weight="800">AI Infrastructure + Agent Product Architect</text>
  <text x="92" y="202" class="muted" font-size="25">Turning GPU clusters, model serving, agent workflows, and system knowledge into repeatable platforms and public-safe notes.</text>

  <rect x="90" y="290" width="330" height="180" rx="18" class="card"/>
  <rect x="112" y="318" width="18" height="94" rx="8" class="green"/>
  <text x="150" y="350" class="ink" font-size="31" font-weight="800">AI Infra</text>
  <text x="150" y="394" class="muted" font-size="22">OCDP, GPU scheduling,</text>
  <text x="150" y="426" class="muted" font-size="22">Kubernetes, vLLM serving</text>

  <rect x="460" y="290" width="330" height="180" rx="18" class="card"/>
  <rect x="482" y="318" width="18" height="94" rx="8" class="blue"/>
  <text x="520" y="350" class="ink" font-size="31" font-weight="800">Agent Systems</text>
  <text x="520" y="394" class="muted" font-size="22">Sandbox, memory gateway,</text>
  <text x="520" y="426" class="muted" font-size="22">skills and self-improvement</text>

  <rect x="830" y="290" width="330" height="180" rx="18" class="card"/>
  <rect x="852" y="318" width="18" height="94" rx="8" class="cyan"/>
  <text x="890" y="350" class="ink" font-size="31" font-weight="800">Applied AI</text>
  <text x="890" y="394" class="muted" font-size="22">memory-aware systems,</text>
  <text x="890" y="426" class="muted" font-size="22">feedback and evaluation</text>

  <rect x="1200" y="290" width="310" height="180" rx="18" class="card"/>
  <rect x="1222" y="318" width="18" height="94" rx="8" class="purple"/>
  <text x="1260" y="350" class="ink" font-size="31" font-weight="800">Knowledge</text>
  <text x="1260" y="394" class="muted" font-size="22">public-safe notes,</text>
  <text x="1260" y="426" class="muted" font-size="22">docs and diagrams</text>

  <path class="line" d="M420 380H460M790 380H830M1160 380H1200"/>

  <rect x="220" y="585" width="1160" height="170" rx="28" fill="#101820"/>
  <text x="275" y="640" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Positioning</text>
  <text x="275" y="690" fill="#cde8d0" font-family="Inter, Arial, sans-serif" font-size="25">I build the connective layer between infrastructure and user-facing AI workflows:</text>
  <text x="275" y="730" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25">GPU platform -> model runtime -> agent memory/tooling -> application feedback loop.</text>

  <circle cx="1410" cy="660" r="62" class="orange"/>
  <text x="1372" y="672" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900">2026</text>
</svg>
